spring.application.name=finguard-sentinel-backend

# ===============================
# PRODUCTION DATABASE CONFIGURATION (AWS RDS)
# ===============================
# These will be injected via your docker-compose file on the EC2 server
spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/finguard
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false 


# ===============================
# FLYWAY & ENVERS CONFIGURATION
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.jpa.properties.hibernate.envers.audit_table_suffix=_AUD
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ===============================
# JWT CONFIGURATION
# ===============================
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=86400000

# ===============================
# PRODUCTION LOGGING STRATEGY
# ===============================
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR
logging.level.com.bhaumik18.finguard=INFO

logging.file.name=logs/finguard-prod.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=100MB
spring.application.name=finguard-sentinel-backend

# Local H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:finguarddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable the H2 Web Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA and Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate SQL Formatting & Envers Audit Trail Setup
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.envers.audit_table_suffix=_AUD

spring.jpa.open-in-view=false
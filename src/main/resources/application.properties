spring.application.name=finguard-sentinel-backend

# ===============================
# DATABASE CONFIGURATION (PostgreSQL via Docker)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/finguard
spring.datasource.username=finguard_admin
spring.datasource.password=enterprise_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Settings
# 'validate' ensures Flyway is the boss of the schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ===============================
# FLYWAY CONFIGURATION
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===============================
# ENVERS & API SETTINGS
# ===============================
spring.jpa.properties.hibernate.envers.audit_table_suffix=_AUD
spring.jpa.open-in-view=false

# Force Hibernate to use the exact names provided in the SQL/Annotations
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ===============================
# JWT CONFIGURATION
# ===============================
application.security.jwt.secret-key=${JWT_SECRET_KEY:VGhpc0lzQUR1bW15U2VjcmV0S2V5Rm9yVGVzdGluZ1B1cnBvc2VzT25seQ==}
application.security.jwt.expiration=86400000
spring.application.name=finguard-sentinel-backend

# Local H2 Database Configuration
# Local H2 Database Configuration
# Removed the complex INIT command to prevent the "PUBLICSPRING" collision
# 1. Standard H2 URL
spring.datasource.url=jdbc:h2:mem:finguarddb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. Let Flyway be the Boss (Hibernate stands down)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# 3. Flyway Essentials
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# 4. Envers & API Settings
spring.jpa.properties.hibernate.envers.audit_table_suffix=_AUD
spring.jpa.open-in-view=false

# Force Hibernate to use the exact names provided in the SQL/Annotations
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JWT Configuration
# Uses environment variable if present, otherwise falls back to a safe, Base64 dummy key for CI/CD testing
application.security.jwt.secret-key=${JWT_SECRET_KEY:VGhpc0lzQUR1bW15U2VjcmV0S2V5Rm9yVGVzdGluZ1B1cnBvc2VzT25seQ==}
application.security.jwt.expiration=86400000
name: FinGuard CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin' # Standard open-source JDK distribution
        cache: maven # Speeds up future builds by caching dependencies

    - name: Build with Maven
      run: mvn -B clean verify